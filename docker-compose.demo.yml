services:
  demo-db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: clockemail
      POSTGRES_PASSWORD: ${DEMO_DB_PASSWORD}
      POSTGRES_DB: clockemail_demo
    volumes:
      - demo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockemail"]
      interval: 5s
      timeout: 3s
      retries: 5

  demo-app:
    build: .
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://clockemail:${DEMO_DB_PASSWORD}@demo-db:5432/clockemail_demo?schema=public
      NEXT_PUBLIC_BASE_URL: https://demo.clock.email
      DEMO_MODE: "true"
      EMAIL_DISABLED: "true"
      CRON_SECRET: demo-not-used
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    depends_on:
      demo-db:
        condition: service_healthy

volumes:
  demo-pgdata:
