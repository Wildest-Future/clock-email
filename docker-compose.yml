services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: clockemail
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: clockemail
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clockemail"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://clockemail:${DB_PASSWORD}@db:5432/clockemail?schema=public
      NEXT_PUBLIC_BASE_URL: https://clock.email
      SMTP_HOST: ${SMTP_HOST:-smtp.mailgun.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-postmaster@clock.email}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: "clock.email <noreply@clock.email>"
      EMAIL_DISABLED: ${EMAIL_DISABLED:-false}
      MAILGUN_WEBHOOK_SIGNING_KEY: ${MAILGUN_WEBHOOK_SIGNING_KEY}
      CRON_SECRET: ${CRON_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
